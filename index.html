<!DOCTYPE html>
<html>
<head>
<title>For My Naina 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
text-align:center;
overflow:hidden;
background: linear-gradient(-45deg,#ff9ec4,#ffd6e8,#ffc0cb,#ffe6f2);
background-size:400% 400%;
animation:bg 10s ease infinite;
}
@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.screen{display:none;}

.bunny{font-size:90px;animation:bounce 1s infinite;}
@keyframes bounce{50%{transform:translateY(-15px);}}

.card{
background:purple;
padding:25px;
margin:60px auto;
width:90%;
max-width:420px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4da6;
color:purple;
margin:8px;
cursor:pointer;
}

input{
padding:10px;
border-radius:20px;
border:none;
margin:10px;
}

.cloud{
position:absolute;
background:palevioletred;
padding:10px 18px;
border-radius:30px;
animation:fall 3s forwards;
font-weight:bold;
}
@keyframes fall{
from{transform:translateY(-200px);}
to{transform:translateY(350px);}
}

.heart{
position:absolute;
bottom:-20px;
animation:rise 5s infinite;
}
@keyframes rise{
to{transform:translateY(-800px);}
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div id="s1" class="screen" style="display:block">
<div class="bunny">🐰</div>
<h2>Welcome Naina 💖</h2>
<button onclick="next(1,2)">Next</button>
</div>

<!-- Screen 2 -->
<div id="s2" class="screen">
<div class="bunny">🐰✨</div>
<h2>Hello Naina 💖</h2>
<button onclick="next(2,3)">Next</button>
</div>

<!-- Screen 3 -->
<div id="s3" class="screen">
<h2>✨ A little magic for you ✨</h2>
<div style="font-size:80px;">🧚❤️👑</div>
<button onclick="next(3,4)">Next</button>
</div>

<!-- Login -->
<div id="s4" class="screen">
<div class="card">
<h3>Login 💖</h3>
<p>Only Naina can enter</p>
<input id="u" placeholder="name"><br>
<input id="p" type="password" placeholder="password"><br>
<button onclick="login()">Enter</button>
<p id="err"></p>
</div>
</div>

<!-- Messages -->
<div id="s5" class="screen"></div>

<!-- Quiz -->
<div id="s6" class="screen"></div>

<!-- Ending -->
<div id="s7" class="screen"></div>

<script>

/* 🎵 music */
let bg=new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
bg.loop=true;
bg.volume=0.3;

/* navigation */
function next(a,b){
document.getElementById("s"+a).style.display="none";
document.getElementById("s"+b).style.display="block";

if(a==1) bg.play();
}

/* login */
function login(){
if(u.value.toLowerCase()=="naina" && p.value=="0501"){
next(4,5);
startMsgs();
}else{
err.innerText="Only Naina allowed 💖";
}
}

/* 💌 messages */
let msgs=[
"You are beautiful 💖",
"You are magical ✨",
"You make everything brighter 🌸",
"You are special 💫",
"Stay happy always 😊",
"This is just for you 💌"
];

function startMsgs(){
let i=0;
let interval=setInterval(()=>{
if(i>=msgs.length){
clearInterval(interval);
setTimeout(()=>{
next(5,6);
startQuiz();   // ✅ IMPORTANT FIX
},2000);
return;
}

let c=document.createElement("div");
c.className="cloud";
c.innerText=msgs[i];
c.style.left=Math.random()*70+"%";

document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);

i++;
},2000);
}

/* 🎮 QUIZ */
let questions=[
{q:"Are you special?",o:["Yes","No"],a:"yes"},
{q:"Who is best?",o:["You","Me"],a:"you"},
{q:"Should you smile?",o:["Yes","No"],a:"yes"},
{q:"Are you queen?",o:["Yes","No"],a:"yes"},
{q:"Do you matter?",o:["Yes","No"],a:"yes"},
{q:"Stay happy?",o:["Yes","No"],a:"yes"}
];

let i=0,score=0,time=10,timer;

function startQuiz(){
showQ();
}

function showQ(){
let q=questions[i];

s6.innerHTML=`
<div class="card">
<h3>${q.q}</h3>
<p id="timer">⏳10</p>
<div id="opts"></div>
<p id="res"></p>
<p>Score: ${score}</p>
</div>
`;

let html="";
q.o.forEach(o=>{
html+=`<button onclick="answer('${o.toLowerCase()}')">${o}</button>`;
});
document.getElementById("opts").innerHTML=html;

/* timer */
time=10;
clearInterval(timer);
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="⏳"+time;

if(time<=0){
clearInterval(timer);
nextQ();
}
},1000);
}

function answer(ans){
clearInterval(timer);

/* disable buttons */
document.querySelectorAll("#opts button").forEach(b=>b.disabled=true);

if(ans==questions[i].a){
document.getElementById("res").innerText="Correct 💖";
score++;
}else{
document.getElementById("res").innerText="Oops 😜";
}

setTimeout(nextQ,1000);
}

function nextQ(){
i++;
if(i<questions.length){
showQ();
}else{
endGame();
}
}

function endGame(){
next(6,7);

s7.innerHTML=`
<div class="card">
<h2>Finished 💖</h2>
<p>Score: ${score}/6</p>
<p>How did you like it? 💌</p>
<input id="fb"><br>
<button onclick="finalMsg()">Submit</button>
</div>
`;
}

function finalMsg(){
s7.innerHTML=`
<div class="card">
<h2>You are a very good friend 💖</h2>
<p>Thank you 😊</p>
</div>
`;
}

/* ❤️ hearts */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerText="❤️";
h.style.left=Math.random()*window.innerWidth+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

</script>

</body>
</html>
